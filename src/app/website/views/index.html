<!-- layout $templates/base-landing.html -->
<app-main>
    <app-header>Friendly File Server (FFS)</app-header>
    <form method="POST" action="/api/user-logon">
        <fieldset>
            <legend>Username</legend>
            <input id="username" name="username" type="text" />
        </fieldset>
        <fieldset>
            <legend>Password</legend>
            <input id="password" name="password" type="password" />
        </fieldset>
        <fieldset>
            <button class="hero-button" type="submit">Log on</button>
        </fieldset>
    </form>
</app-main>
